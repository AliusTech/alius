name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release-as:
        description: 'Force a specific version (e.g., 0.0.1)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.ALIUS_RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release-as }}
        env:
          GIT_AUTHOR_NAME: alius
          GIT_AUTHOR_EMAIL: weixug@alius.tech
          GIT_COMMITTER_NAME: alius
          GIT_COMMITTER_EMAIL: weixug@alius.tech
