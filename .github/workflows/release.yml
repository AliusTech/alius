name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: alius-linux-x64
            binary: alius
            rust_target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-darwin
            artifact: alius-macos-x64
            binary: alius
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-darwin
            artifact: alius-macos-arm64
            binary: alius
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-windows
            artifact: alius-windows-x64
            binary: alius.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate version consistency
        shell: bash
        run: |
          # Get version from tag
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG_NAME#v}"

          # Get version from .version file
          FILE_VERSION=$(cat .version | tr -d '\n')

          # Get version from Cargo.toml
          CARGO_VERSION=$(grep "^version = " Cargo.toml | head -1 | sed 's/version = "//' | sed 's/"//' | tr -d '\n')

          echo "Tag version:    $TAG_VERSION"
          echo "File version:   $FILE_VERSION"
          echo "Cargo version:  $CARGO_VERSION"

          # Validate consistency
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Git tag version ($TAG_VERSION) does not match .version file ($FILE_VERSION)"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Git tag version ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "✓ Version consistency validated"

      - name: Install Rust (default)
        if: ${{ matrix.rust_target == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust (cross compile)
        if: ${{ matrix.rust_target != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install musl tools (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (default)
        if: ${{ matrix.rust_target == '' }}
        run: cargo build --release

      - name: Build (cross compile)
        if: ${{ matrix.rust_target != '' }}
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Prepare artifact (Unix)
        if: ${{ matrix.os != 'windows-latest' && matrix.rust_target == '' }}
        run: |
          cd target/release
          tar -czvf ../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          cd ../../

      - name: Prepare artifact (Unix cross)
        if: ${{ matrix.os != 'windows-latest' && matrix.rust_target != '' }}
        run: |
          cd target/${{ matrix.rust_target }}/release
          tar -czvf ../../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          cd ../../../

      - name: Prepare artifact (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          cd target/release
          7z a ../../${{ matrix.artifact }}.zip ${{ matrix.binary }}
          cd ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Get version
        id: version
        run: |
          # Use tag name as version (remove 'v' prefix)
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Alius ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          files: |
            artifacts/alius-linux-x64/alius-linux-x64.tar.gz
            artifacts/alius-macos-x64/alius-macos-x64.tar.gz
            artifacts/alius-macos-arm64/alius-macos-arm64.tar.gz
            artifacts/alius-windows-x64/alius-windows-x64.zip

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update npm package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Function to update version safely
          update_version() {
            local pkg_dir="$1"
            local current_version=$(cat "$pkg_dir/package.json" | jq -r '.version')

            if [ "$current_version" != "$VERSION" ]; then
              cd "$pkg_dir"
              npm version $VERSION --no-git-tag-version
              cd - > /dev/null
            else
              echo "Version already $VERSION in $pkg_dir, skipping"
            fi
          }

          # Update main package
          update_version "npm-packages/alius"
          jq --arg v "$VERSION" '.optionalDependencies = (.optionalDependencies | map_values($v))' npm-packages/alius/package.json > npm-packages/alius/package.json.tmp && mv npm-packages/alius/package.json.tmp npm-packages/alius/package.json

          # Update platform packages
          for pkg in alius-darwin-x64 alius-darwin-arm64 alius-linux-x64 alius-linux-arm64 alius-win32-x64 alius-win32-arm64; do
            update_version "npm-packages/$pkg"
          done

      - name: Publish platform packages
        run: |
          for pkg in alius-darwin-x64 alius-darwin-arm64 alius-linux-x64 alius-linux-arm64 alius-win32-x64 alius-win32-arm64; do
            cd "npm-packages/$pkg"
            npm publish --access public --provenance
            cd ../..
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd npm-packages/alius
          npm publish --access public --provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}