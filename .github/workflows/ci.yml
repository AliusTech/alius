name: CI

on:
  pull_request:
    branches:
      - main
      - release
  push:
    branches:
      - main
      - release

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  ci:
    name: CI Check (fmt + clippy + test + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version consistency
        run: bash scripts/check-version.sh --warn-only

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --locked --workspace --all-targets --all-features

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all --features testing -- --test-threads=1

      - name: Build release binary
        run: cargo build -p alius-cli --bin alius --release --locked

      - name: Scan release binary for test symbols
        run: |
          SCAN=$(strings target/release/alius | grep -cE 'FakeProvider|FakeTool|TuiTestHarness|CoreRuntimeHarness|VecEventSource|testing::|testkit' || true)
          if [ "$SCAN" -gt 0 ]; then
            echo "ERROR: Test symbols found in release binary"
            strings target/release/alius | grep -E 'FakeProvider|FakeTool|TuiTestHarness|CoreRuntimeHarness|VecEventSource|testing::|testkit'
            exit 1
          fi
          echo "Release binary clean — no test symbols found"

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run security audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0089 --ignore RUSTSEC-2025-0012 --ignore RUSTSEC-2024-0384 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002
