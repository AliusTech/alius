name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  check:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

  build:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: alius-linux-x64
            binary: alius
          - os: macos-latest
            target: x86_64-darwin
            artifact: alius-macos-x64
            binary: alius
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-darwin
            artifact: alius-macos-arm64
            binary: alius
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-windows
            artifact: alius-windows-x64
            binary: alius.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        shell: bash
        run: |
          # Get version from tag
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG_NAME#v}"

          # Cargo.toml is only the local/dev fallback; release builds use the tag.
          CARGO_VERSION=$(grep "^version" Cargo.toml | head -1 | sed 's/version = "//' | sed 's/"//')

          echo "Tag version:    $TAG_VERSION"
          echo "Cargo fallback: $CARGO_VERSION"

          if [[ ! "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: Git tag version ($TAG_VERSION) is not a valid semver version"
            exit 1
          fi

          echo "ALIUS_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

          echo "Release version resolved from tag"

      - name: Install Rust (default)
        if: ${{ matrix.rust_target == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust (cross compile)
        if: ${{ matrix.rust_target != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (default)
        if: ${{ matrix.rust_target == '' }}
        run: cargo build --release

      - name: Build (cross compile)
        if: ${{ matrix.rust_target != '' }}
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Prepare artifact (Unix)
        if: ${{ matrix.os != 'windows-latest' && matrix.rust_target == '' }}
        run: |
          cd target/release
          tar -czvf ../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          cd ../../

      - name: Prepare artifact (Unix cross)
        if: ${{ matrix.os != 'windows-latest' && matrix.rust_target != '' }}
        run: |
          cd target/${{ matrix.rust_target }}/release
          tar -czvf ../../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          cd ../../../

      - name: Prepare artifact (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          cd target/release
          7z a ../../${{ matrix.artifact }}.zip ${{ matrix.binary }}
          cd ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: false

      - name: Get version
        id: version
        run: |
          # Use tag name as version (remove 'v' prefix)
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Alius ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          files: |
            artifacts/alius-linux-x64/alius-linux-x64.tar.gz
            artifacts/alius-macos-x64/alius-macos-x64.tar.gz
            artifacts/alius-macos-arm64/alius-macos-arm64.tar.gz
            artifacts/alius-windows-x64/alius-windows-x64.zip

  publish-npm:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Get version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Trusted Publishing prerequisites
        run: |
          node --version
          npm --version
          node - <<'NODE'
          const { execSync } = require('child_process');

          function assertAtLeast(name, actual, minimum) {
            const got = actual.replace(/^v/, '').split('.').map(Number);
            const min = minimum.split('.').map(Number);
            for (let i = 0; i < min.length; i += 1) {
              if ((got[i] || 0) > min[i]) return;
              if ((got[i] || 0) < min[i]) {
                throw new Error(`${name} ${actual} is below required ${minimum}`);
              }
            }
          }

          assertAtLeast('Node.js', process.version, '22.14.0');
          assertAtLeast('npm', execSync('npm --version', { encoding: 'utf8' }).trim(), '11.5.1');
          NODE

      - name: Prepare npm packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node npm-packages/generate-packages.js "$VERSION"
          node npm-packages/verify-release-version.js "$VERSION"

      - name: Publish platform packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          for pkg in alius-darwin-x64 alius-darwin-arm64 alius-linux-x64 alius-win32-x64; do
            if npm view "@alius-tech/$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "Skipping @alius-tech/$pkg@$VERSION (already published)"
              continue
            fi
            echo "Publishing @alius-tech/$pkg@$VERSION..."
            cd "npm-packages/$pkg"
            npm publish --access public --provenance --tag latest
            cd ../..
          done

      - name: Publish main package
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if npm view "@alius-tech/alius@$VERSION" version >/dev/null 2>&1; then
            echo "Skipping @alius-tech/alius@$VERSION (already published)"
            exit 0
          fi

          cd npm-packages/alius
          npm publish --access public --provenance --tag latest

  update-homebrew:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Download release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/AliusTech/alius/releases/download/v${VERSION}"
          mkdir -p artifacts

          curl -fsSL -o artifacts/alius-macos-arm64.tar.gz "${BASE_URL}/alius-macos-arm64.tar.gz"
          curl -fsSL -o artifacts/alius-macos-x64.tar.gz "${BASE_URL}/alius-macos-x64.tar.gz"
          curl -fsSL -o artifacts/alius-linux-x64.tar.gz "${BASE_URL}/alius-linux-x64.tar.gz"

      - name: Compute SHA256 checksums
        id: sha256
        run: |
          echo "arm64=$(sha256sum artifacts/alius-macos-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "x64=$(sha256sum artifacts/alius-macos-x64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x64=$(sha256sum artifacts/alius-linux-x64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: AliusTech/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256_ARM64="${{ steps.sha256.outputs.arm64 }}"
          SHA256_X64="${{ steps.sha256.outputs.x64 }}"
          SHA256_LINUX_X64="${{ steps.sha256.outputs.linux_x64 }}"

          cat > tap/Formula/alius.rb <<RUBY
          class Alius < Formula
            desc "LLM Agent CLI - Software Self-Evolution"
            homepage "https://github.com/AliusTech/alius"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/AliusTech/alius/releases/download/v${VERSION}/alius-macos-arm64.tar.gz"
                sha256 "${SHA256_ARM64}"
              else
                url "https://github.com/AliusTech/alius/releases/download/v${VERSION}/alius-macos-x64.tar.gz"
                sha256 "${SHA256_X64}"
              end
            end

            on_linux do
              url "https://github.com/AliusTech/alius/releases/download/v${VERSION}/alius-linux-x64.tar.gz"
              sha256 "${SHA256_LINUX_X64}"
            end

            def install
              bin.install "alius"
            end

            test do
              system bin/"alius", "--version"
            end
          end
          RUBY

      - name: Push formula update
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/alius.rb
          git diff --staged --quiet && exit 0
          git commit -m "Update alius to ${VERSION}"
          git push
