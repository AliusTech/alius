<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1000" viewBox="0 0 1680 1000" role="img" aria-labelledby="title desc">
  <title id="title">Engineering Main Chain</title>
  <desc id="desc">Alius engineering main chain from product entrypoints through protocol interface, core runtime, session manager, Loop Engine, model provider, tool executor and shell gate, memory system, and CoreEvent stream.</desc>
  <defs>
    <pattern id="paper" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#fbf6ea"/>
      <path d="M0 17.5H18M17.5 0V18" stroke="#e8dcc8" stroke-width="0.5" opacity="0.22"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="7" stdDeviation="0.8" flood-color="#101010" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" fill="none" stroke="#181818" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title-cn { font-family: "Kaiti SC", "STKaiti", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 76px; font-weight: 800; fill: #171717; letter-spacing: 2px; }
      .title-en { font-family: "Bradley Hand", "Comic Sans MS", "PingFang SC", sans-serif; font-size: 34px; font-weight: 700; fill: #666; }
      .label { font-family: "Kaiti SC", "STKaiti", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 31px; font-weight: 700; fill: #171717; }
      .label-small { font-family: "Kaiti SC", "STKaiti", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 27px; font-weight: 700; fill: #171717; }
      .ink { stroke: #171717; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sketch { stroke: #171717; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.42; }
      .box { fill: #fffdf7; stroke: #171717; stroke-width: 3.4; filter: url(#softShadow); }
      .box-ghost { fill: none; stroke: #171717; stroke-width: 1.6; opacity: 0.38; }
      .accent { fill: #cfeef7; stroke: #171717; stroke-width: 3; }
      .muted { stroke: #7aaec0; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #171717; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1680" height="1000" fill="url(#paper)"/>
  <text x="840" y="82" text-anchor="middle" class="title-cn">Engineering Main Chain</text>
  <text x="840" y="130" text-anchor="middle" class="title-en"></text>
