# Alius project soul
#
# This file is the project-level source of agent identity and capability data.
# It stores Agent Card-compatible fields in TOML. Fields that are only known
# after publishing, such as service URLs and public asset URLs, remain empty
# here and are filled when exporting/serving the A2A agent-card.json.

[agent]
name = ""
description = ""
version = "0.1.0"

[agent_card]
documentation_url = ""
icon_url = ""
export_path = ".well-known/agent-card.json"

[[supported_interfaces]]
url = ""
protocol_binding = "HTTP+JSON"
protocol_version = "1.0"

[provider]
organization = ""
url = ""

[capabilities]
streaming = true
push_notifications = false
extended_agent_card = false

[interaction]
default_input_modes = [
  "text/plain",
  "application/json",
]
default_output_modes = [
  "text/plain",
  "application/json",
]

[[skills]]
id = ""
name = ""
description = ""
tags = []
examples = []
input_modes = [
  "text/plain",
  "application/json",
]
output_modes = [
  "text/plain",
  "application/json",
]
